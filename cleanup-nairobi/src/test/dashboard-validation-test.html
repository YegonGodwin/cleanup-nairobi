<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Layout Functionality Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations to match the actual component */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="validation-status" class="fixed top-4 right-4 z-50 bg-blue-500 text-white p-4 rounded-lg shadow-lg">
        <h3 class="font-bold">Validation Status</h3>
        <p id="status-text">Initializing...</p>
        <button id="run-validation" class="mt-2 bg-white text-blue-500 px-3 py-1 rounded text-sm font-medium">
            Run Validation
        </button>
    </div>

    <!-- Mock Dashboard Layout Structure -->
    <div class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-50">
        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 z-40 lg:hidden bg-black bg-opacity-50 transition-opacity hidden"></div>

        <!-- Sidebar -->
        <div id="sidebar-container" class="fixed inset-y-0 left-0 z-50 w-64 transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0 -translate-x-full">
            <aside class="bg-gradient-to-b from-gray-900 via-gray-800 to-gray-900 text-white w-64 min-h-screen flex flex-col">
                <!-- Logo Section -->
                <div class="p-6 border-b border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-green-500 rounded-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-white">CleanUp</h1>
                            <p class="text-sm text-green-400">Nairobi</p>
                        </div>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="flex-1 p-4">
                    <ul class="space-y-2">
                        <li>
                            <a href="#dashboard" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-gradient-to-r from-green-500 to-emerald-500 text-white shadow-lg shadow-green-500/25">
                                <span>Dashboard</span>
                            </a>
                        </li>
                        <li>
                            <a href="#reports" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700/50">
                                <span>Reports</span>
                            </a>
                        </li>
                        <li>
                            <a href="#collections" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700/50">
                                <span>Collections</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>
        </div>

        <!-- Main content - takes remaining space to the right of sidebar -->
        <div class="lg:pl-64">
            <div class="flex flex-col min-h-screen">
                <header class="bg-gradient-to-r from-gray-800 to-gray-700 text-white sticky top-0 z-40 shadow-lg">
                    <div class="px-6 py-3">
                        <div class="flex items-center justify-between">
                            <!-- Left Section - Search -->
                            <div class="flex items-center gap-4 flex-1 max-w-lg">
                                <button id="menu-toggle" class="lg:hidden p-2 hover:bg-gray-700 rounded-lg transition-colors text-gray-300">
                                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                                    </svg>
                                </button>
                                
                                <div class="relative flex-1">
                                    <input type="text" placeholder="Search reports, collections..." class="w-full pl-10 pr-4 py-2.5 bg-gray-700 text-white border border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-200 text-sm placeholder:text-gray-400">
                                </div>
                            </div>

                            <!-- Center Section - Welcome -->
                            <div class="hidden lg:block text-center">
                                <h1 class="text-lg font-semibold text-white">Welcome back, User! 👋</h1>
                            </div>

                            <!-- Right Section - Actions & User -->
                            <div class="flex items-center gap-3">
                                <button class="p-2 hover:bg-gray-700 rounded-lg transition-colors group text-gray-300">
                                    <svg class="w-5 h-5 text-gray-300 group-hover:text-green-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5v-5z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
                
                <main class="flex-1 bg-gradient-to-b from-gray-50 to-white px-4 sm:px-6 pt-4 pb-6">
                    <div class="animate-fadeIn max-w-7xl mx-auto">
                        <div class="space-y-6">
                            <h2 class="text-2xl font-bold text-gray-900">Dashboard Content</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 class="text-lg font-semibold text-gray-800">Waste Collected</h3>
                                    <p class="text-3xl font-bold text-green-600">45.5kg</p>
                                </div>
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 class="text-lg font-semibold text-gray-800">Reports</h3>
                                    <p class="text-3xl font-bold text-blue-600">12</p>
                                </div>
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 class="text-lg font-semibold text-gray-800">Rank</h3>
                                    <p class="text-3xl font-bold text-purple-600">#3</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Sidebar toggle functionality
        const menuToggle = document.getElementById('menu-toggle');
        const sidebarContainer = document.getElementById('sidebar-container');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        let sidebarOpen = false;

        function toggleSidebar() {
            sidebarOpen = !sidebarOpen;
            if (sidebarOpen) {
                sidebarContainer.classList.remove('-translate-x-full');
                sidebarContainer.classList.add('translate-x-0');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebarContainer.classList.add('-translate-x-full');
                sidebarContainer.classList.remove('translate-x-0');
                sidebarOverlay.classList.add('hidden');
            }
        }

        menuToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // Load validation script
        const script = document.createElement('script');
        script.src = './dashboard-functionality-validation.js';
        document.head.appendChild(script);

        // Run validation when button is clicked
        document.getElementById('run-validation').addEventListener('click', function() {
            const statusText = document.getElementById('status-text');
            statusText.textContent = 'Running validation...';
            
            setTimeout(() => {
                if (typeof window.dashboardValidation !== 'undefined') {
                    const results = window.dashboardValidation.runValidation();
                    statusText.innerHTML = `
                        <div class="text-sm">
                            <div>Status: <span class="font-bold ${results.overallStatus === 'PASS' ? 'text-green-300' : 'text-red-300'}">${results.overallStatus}</span></div>
                            <div>Tests: ${results.passedTests}/${results.totalTests} passed</div>
                            <div>Success Rate: ${results.successRate.toFixed(1)}%</div>
                        </div>
                    `;
                } else {
                    statusText.textContent = 'Validation script not loaded';
                }
            }, 500);
        });

        // Auto-run validation after page loads
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('run-validation').click();
            }, 1000);
        });
    </script>
</body>
</html>
